<script>
// 브라우저 기본 PWA 설치 팝업을 막고, 커스텀 배너로 대체
(function() {
  var deferredPrompt = null;
  var INSTALLED_KEY = 'b2_pwa_installed';      // 영구 — 설치 완료
  var DISMISS_AT_KEY = 'b2_pwa_dismissed_at';  // 마지막 닫기 시각 (timestamp)
  var DISMISS_HOURS = 1;                       // 닫은 후 N시간 동안 다시 안 보임
  // 이전 버전 키 정리
  try { localStorage.removeItem('b2_pwa_install_dismissed_at'); } catch (e) {}
  try { sessionStorage.removeItem('b2_pwa_dismissed'); } catch (e) {}

  function log() {
    try { console.log.apply(console, ['[PWA설치]'].concat([].slice.call(arguments))); } catch (e) {}
  }

  function isStandalone() {
    return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
      || window.navigator.standalone === true;
  }

  // 설치 완료 여부
  function isInstalled() {
    if (isStandalone()) return true;
    try { return localStorage.getItem(INSTALLED_KEY) === 'true'; } catch (e) { return false; }
  }
  function markInstalled() {
    try { localStorage.setItem(INSTALLED_KEY, 'true'); } catch (e) {}
  }

  // 최근 N시간 안에 닫았는지 — 시간 기반 쿨다운
  function isDismissedRecently() {
    try {
      var t = localStorage.getItem(DISMISS_AT_KEY);
      if (!t) return false;
      var elapsed = Date.now() - parseInt(t, 10);
      return elapsed < DISMISS_HOURS * 60 * 60 * 1000;
    } catch (e) { return false; }
  }
  function markDismissed() {
    try { localStorage.setItem(DISMISS_AT_KEY, String(Date.now())); } catch (e) {}
  }

  function showBanner(force) {
    if (!force) {
      if (isInstalled()) { log('이미 설치됨 → 배너 안 보임'); return; }
      if (isDismissedRecently()) { log('최근에 닫음(' + DISMISS_HOURS + '시간 쿨다운) → 배너 안 보임'); return; }
    }
    var banner = document.getElementById('pwa-install-banner');
    if (banner) { banner.classList.add('show'); log('배너 표시'); }
  }

  function hideBanner() {
    var banner = document.getElementById('pwa-install-banner');
    if (banner) banner.classList.remove('show');
  }

  // 디버깅/수동 트리거
  window.b2ShowInstall = function() {
    try { localStorage.removeItem(INSTALLED_KEY); } catch (e) {}
    try { localStorage.removeItem(DISMISS_AT_KEY); } catch (e) {}
    if (!deferredPrompt) {
      log('beforeinstallprompt 이벤트가 아직 발생하지 않음. 원인: 1) 이미 설치됨 2) iOS Safari(미지원) 3) HTTPS 아님 4) Chrome 엔게이지먼트 부족');
    }
    showBanner(true);
  };

  // 기본 설치 팝업 차단
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredPrompt = e;
    log('beforeinstallprompt 발생 → 기본 팝업 차단, 커스텀 배너 표시 시도');
    showBanner();
  });

  // 설치 완료 — 영구 플래그
  window.addEventListener('appinstalled', function() {
    log('앱 설치 완료 → 영구 숨김');
    markInstalled();
    hideBanner();
    deferredPrompt = null;
  });

  document.addEventListener('DOMContentLoaded', function() {
    if (isStandalone()) { log('현재 standalone(설치된 PWA) 모드'); }
    var installBtn = document.getElementById('pwa-install-btn');
    var laterBtn = document.getElementById('pwa-install-later');
    var closeBtn = document.getElementById('pwa-install-close');

    if (installBtn) {
      installBtn.addEventListener('click', function() {
        if (!deferredPrompt) {
          log('아직 설치 가능 상태가 아님. 잠시 후 다시 시도해주세요.');
          return;
        }
        var promptEvent = deferredPrompt;
        deferredPrompt = null;
        promptEvent.prompt();
        promptEvent.userChoice.then(function(choice) {
          if (choice && choice.outcome === 'accepted') {
            log('사용자 설치 수락');
            // appinstalled 이벤트가 곧 fire되어 markInstalled() 호출
          } else {
            log('사용자 설치 취소 → ' + DISMISS_HOURS + '시간 쿨다운');
            markDismissed();
          }
          hideBanner();
        }).catch(function(err) {
          log('userChoice 에러:', err);
          hideBanner();
        });
      });
    }

    // 닫기/나중에: 시간 기반 쿨다운 (PC/모바일 일관 동작)
    function dismiss() {
      markDismissed();
      hideBanner();
      log('사용자가 닫음 → ' + DISMISS_HOURS + '시간 동안 안 보임');
    }
    if (laterBtn) laterBtn.addEventListener('click', dismiss);
    if (closeBtn) closeBtn.addEventListener('click', dismiss);
  });
})();
</script>

<!-- 동영상 전체화면 진입 시 가로(landscape)로 자동 회전 (Android Chrome / 데스크톱) -->
<!-- iOS는 PWA에서 Screen Orientation API를 막아놨음 → 유튜브 자체 전체화면 버튼이 native로 처리 -->
<script>
(function() {
  function lockLandscape() {
    if (screen.orientation && typeof screen.orientation.lock === 'function') {
      screen.orientation.lock('landscape').catch(function() { /* 무시 */ });
    }
  }
  function unlockOrientation() {
    if (screen.orientation && typeof screen.orientation.unlock === 'function') {
      try { screen.orientation.unlock(); } catch (e) {}
    }
  }
  function onChange() {
    var fsEl = document.fullscreenElement || document.webkitFullscreenElement;
    if (fsEl) lockLandscape(); else unlockOrientation();
  }
  document.addEventListener('fullscreenchange', onChange);
  document.addEventListener('webkitfullscreenchange', onChange);
})();
</script>

  try {
    var cached = localStorage.getItem('b2_db_cache');

});

// DB 응답 캐시 (다음 새로고침 시 깜빡임 방지)
function saveDbCache(s) {
  try {
    localStorage.setItem('b2_db_cache', JSON.stringify({
      banners: s.banners,
      notices: s.notices,
      announcements: s.announcements,
      courses: s.courses,
    }));
  } catch {}
}

// Supabase에서 subjects, courses, videos, banners, notices, announcements 로드
async function loadFromDB() {
try {
// 배너/공지/발표를 병렬로 로드 (관리자 페이지에 안 들어가도 일반 사용자가 최신 데이터 보게)
const [bannersRes, noticesRes, announcementsRes] = await Promise.all([
window.supabase.from('banners').select('*').order('sort_order'),
window.supabase.from('notices').select('*').order('id', { ascending: false }),
window.supabase.from('announcements').select('*').order('created_at', { ascending: false }),
]);
setState(s => {
const next = { ...s };
if (bannersRes.data && bannersRes.data.length > 0) next.banners = bannersRes.data;
if (noticesRes.data && noticesRes.data.length > 0) next.notices = noticesRes.data;
if (announcementsRes.data && announcementsRes.data.length > 0) next.announcements = announcementsRes.data;
saveDbCache(next);
return next;
});

const { data: subjects } = await window.supabase
.from('subjects').select('*').order('sort_order');

subject: c.subjects?.name || '',
color: c.subjects?.color || '#E60012',
name: c.title,
description: c.description,
grade: c.grade || '',
level: c.level || '',
class_id: c.class_id || null,
days: 0,
duration: 0,
teacher: c.teacher || '',
price: c.price || '',
badge: null,
lectures: (c.videos || [])
.filter(v => !v.expires_at || new Date(v.expires_at).getTime() > Date.now())
.sort((a,b) => a.sort_order - b.sort_order).map(v => ({
id: v.id,
title: v.title,
videoUrl: B2Utils.lectureVideoUrl(v),
youtubeId: v.youtube_id || '',
expires_at: v.expires_at || null,
})),
}));
setState(prev => {
const next = { ...prev, courses: mapped };
saveDbCache(next);
return next;
});
}
setDbLoaded(true);
} catch(e) {
console.error('DB 로드 실패:', e);
setDbLoaded(true);
}
}

React.useEffect(() => { loadFromDB(); }, []);

// 브라우저 뒤로가기 지원 + 폰 뒤로가기 앱 내 처리
React.useEffect(() => {
function handlePopState(e) {
const p = e.state?.page || 'home';
// 홈이면 다시 history 스택 쌓아서 앱 밖으로 못 나가게
if (p === 'home') {
  window.history.pushState({ page: 'home' }, '', '');
}
setPage(p);
try { sessionStorage.setItem('b2_page', p); } catch {}
}
window.addEventListener('popstate', handlePopState);
// 초기 스택: home을 두 번 쌓아서 첫 뒤로가기가 앱 내에서 처리되게
const curPage = (()=>{ try { return sessionStorage.getItem('b2_page')||'home'; } catch { return 'home'; } })();
window.history.replaceState({ page: 'home' }, '', '');
window.history.pushState({ page: curPage }, '', '');
return () => window.removeEventListener('popstate', handlePopState);
}, []);

function navigate(p) {
setPage(p);
try { sessionStorage.setItem('b2_page', p); } catch {}
window.history.pushState({ page: p }, '', '');
window.scrollTo({ top: 0, behavior: 'smooth' });
}

function getUserRole(u) {
return String(u?.role || u?.user_role || u?.type || u?.user_type || '').trim().toLowerCase();
}

function isTeacherUser(u) {
const role = getUserRole(u);
return role === 'teacher' || role === 'teachers' || role === '선생님' || role === '강사';
}

function handleLogin(u) {
setUser(u);
setShowLogin(false);
try {
  sessionStorage.setItem('b2_user', JSON.stringify(u));
} catch {}

const role = getUserRole(u);
if (role === 'admin' || role === 'administrator' || role === '관리자') {
setIsAdmin(true);
setAdminAuthed(true);
try { sessionStorage.setItem('b2_is_admin','true'); sessionStorage.setItem('b2_admin_authed','true'); } catch {}
navigate('admin');
return;
}

if (isTeacherUser(u)) {
navigate('teacher');
return;
}

if (role === 'student' || role === 'students' || role === '학생') {
navigate('portal');
}
}

function handleLogout() {
setUser(null);
setIsAdmin(false);
setAdminAuthed(false);
try {
  sessionStorage.removeItem('b2_user');
  sessionStorage.removeItem('b2_is_admin');
  sessionStorage.removeItem('b2_admin_authed');
  sessionStorage.removeItem('b2_page');
} catch {}
navigate('home');
}

function handleAdminClick() {
navigate('admin');
}

// 회원가입 페이지로 바로 이동
function handleSignup() {
setShowLogin(false);
navigate('signup');
}

const effectiveUser = adminAuthed
? (user || { id:'admin', name:'관리자', role:'admin', isAdmin:true })
: user;

return React.createElement('div', { style:{ minHeight:'100vh', display:'flex', flexDirection:'column' } },

// 로그인 모달
showLogin && React.createElement(LoginModal, {
onLogin: handleLogin,
onClose: ()=>setShowLogin(false),
onAdminLogin: ()=>{
const adminUser = { id:'admin', name:'관리자', role:'admin', isAdmin:true };
setUser(adminUser);
setIsAdmin(true);
setAdminAuthed(true);
try {
  sessionStorage.setItem('b2_user', JSON.stringify(adminUser));
  sessionStorage.setItem('b2_is_admin','true');
  sessionStorage.setItem('b2_admin_authed','true');
} catch {}
navigate('admin');
},
onSignup: handleSignup,
}),

// 상단 네비
React.createElement(MainNav, {
page,
setPage: navigate,
user: effectiveUser,
adminAuthed,
onLoginClick: ()=>setShowLogin(true),
onSignupClick: handleSignup,
onAdminClick: handleAdminClick,
onLogout: handleLogout,
examDate: EXAM_DATE,
}),

// 메인 콘텐츠
adminAuthed && page !== 'admin' && React.createElement('button', {
  onClick:function(){ navigate('admin'); },
  style:{ position:'fixed', right:'22px', top:'104px', zIndex:9999, background:'#1A1A1A', color:'#fff', border:'none', borderRadius:'999px', padding:'9px 15px', fontSize:'13px', fontWeight:'800', boxShadow:'0 6px 18px rgba(0,0,0,0.18)', cursor:'pointer', fontFamily:'Manrope, sans-serif' }
}, '관리자 페이지'),

isTeacherUser(effectiveUser) && !adminAuthed && page !== 'teacher' && React.createElement('button', {
  onClick:function(){ navigate('teacher'); },
  style:{ position:'fixed', right:'22px', top:'104px', zIndex:9999, background:'#3A3A3A', color:'#fff', border:'none', borderRadius:'999px', padding:'9px 15px', fontSize:'13px', fontWeight:'800', boxShadow:'0 6px 18px rgba(0,0,0,0.18)', cursor:'pointer', fontFamily:'Manrope, sans-serif' }
}, '선생님 페이지'),

React.createElement('main', { style:{ flex:1 } },

page === 'home' && React.createElement(HomePage, {
banners: state.banners,
slides: state.slides,
categories: [
{ emoji:'', label:'수학', page:'service', highlight:false },
{ emoji:'', label:'영어', page:'service', highlight:false },
{ emoji:'', label:'국어', page:'service', highlight:false },
{ emoji:'', label:'과학', page:'service', highlight:false },
{ emoji:'', label:'내신 대비', page:'service', highlight:false },
{ emoji:'', label:'수능 특강', page:'service', highlight:true },
],
notices: state.notices,
announcements: state.announcements,
setPage: navigate,
isAdmin,
content: state.content,
onAdminAction: ()=>{},
}),

page === 'service' && React.createElement(ServicePage, { setPage: navigate, courses: state.courses, user: effectiveUser, onLoginClick: ()=>setShowLogin(true), refresh: loadFromDB }),
page === 'contact' && React.createElement(ContactPage),
page === 'about' && React.createElement(AboutPage),
page === 'recruit' && React.createElement(RecruitPage, { setPage: navigate }),

page === 'signup' && React.createElement(SignupPage, {
onBack: ()=>{ navigate('home'); },
onComplete: ()=>{ navigate('home'); },
}),

page === 'portal' && React.createElement(StudentPortal, {
user: effectiveUser,
isAdmin: adminAuthed || isTeacherUser(effectiveUser),
adminAuthed,
courses: state.courses,
onLoginClick: ()=>setShowLogin(true),
}),

page === 'teacher' && React.createElement(TeacherPortal, {
user: effectiveUser,
courses: state.courses,
isAdmin: adminAuthed,
adminAuthed,
onLogout: handleLogout,
}),

page === 'admin' && React.createElement(AdminPanel, {
state,
setState,
adminAuthed,
setAdminAuthed,
onLogout: null,
}),
),
);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
