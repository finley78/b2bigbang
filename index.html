<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2빅뱅학원 — Web App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Lora:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; max-width: 100%; }
  html, body { overflow-x: hidden; width: 100%; }
  html { font-size: 62.5%; scroll-behavior: smooth; }
  body { font-family: 'Manrope', sans-serif; background: #f2f0eb; min-height: 100vh; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #f2f0eb; }
  ::-webkit-scrollbar-thumb { background: #d4e9e2; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="TopNav.jsx"></script>
<script type="text/babel" src="HomePage.jsx"></script>
<script type="text/babel" src="Pages.jsx"></script>
<script type="text/babel" src="StudentPortal.jsx"></script>
<script type="text/babel" src="AdminPanel.jsx"></script>

<script>
const SUPABASE_URL = 'https://ldsjysjavwssadheeiog.supabase.co';
const SUPABASE_KEY = 'YOUR_KEY';
window.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
</script>

<script type="text/babel">
const INITIAL_STATE = window.INITIAL_STATE || {};
const EXAM_DATE = '2026-11-12';

function App() {
  const [page, setPage] = React.useState('home');
  const [user, setUser] = React.useState(null);
  const [showLogin, setShowLogin] = React.useState(false);
  const [isAdmin, setIsAdmin] = React.useState(false);
  const [adminAuthed, setAdminAuthed] = React.useState(false);
  const [state, setState] = React.useState(INITIAL_STATE);

  function navigate(p) {
    setPage(p);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function handleLogin(u) {
    setUser(u);
    setShowLogin(false);
  }

  function handleLogout() {
    setUser(null);
    setIsAdmin(false);
    setAdminAuthed(false);
    navigate('home');
  }

  function handleAdminClick() {
    navigate('admin');
  }

  function handleSignup() {
    setShowLogin(false);
    navigate('signup');
  }

  return React.createElement('div', { style:{ minHeight:'100vh', display:'flex', flexDirection:'column' } },

    showLogin && React.createElement(LoginModal, {
      onLogin: handleLogin,
      onClose: ()=>setShowLogin(false),
      onAdminLogin: ()=>{ setAdminAuthed(true); navigate('admin'); },
      onSignup: handleSignup,
    }),

    React.createElement(TopBar, {
      user,
      onLoginClick: ()=>setShowLogin(true),
      onLogout: handleLogout,
      onAdminClick: handleAdminClick,
      examDate: EXAM_DATE,
    }),

    React.createElement(MainNav, {
      page,
      setPage: navigate,
      user,
      adminAuthed,
      onLoginClick: ()=>setShowLogin(true),
      onSignupClick: handleSignup,
      onAdminClick: handleAdminClick,
      onLogout: handleLogout,
      examDate: EXAM_DATE,
    }),

    React.createElement('main', { style:{ flex:1 } },

      page === 'admin' && React.createElement(AdminPanel, {
        state,
        setState,
        adminAuthed,
        setAdminAuthed,
        onLogout: null
      })
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
