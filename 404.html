<div id="pwa-install-banner" role="dialog" aria-labelledby="pwa-install-title" aria-describedby="pwa-install-desc">

    <div class="pwa-install-icon" aria-hidden="true">

<script>
// 브라우저 기본 PWA 설치 팝업을 막고, 커스텀 배너로 대체
(function() {
  var deferredPrompt = null;
  var INSTALLED_KEY = 'b2_pwa_installed';      // 영구 — 설치 완료
  var DISMISS_AT_KEY = 'b2_pwa_dismissed_at';  // 마지막 닫기 시각 (timestamp)
  var DISMISS_HOURS = 1;                       // 닫은 후 N시간 동안 다시 안 보임
  // 이전 버전 키 정리
  try { localStorage.removeItem('b2_pwa_install_dismissed_at'); } catch (e) {}
  try { sessionStorage.removeItem('b2_pwa_dismissed'); } catch (e) {}

  function log() {
    try { console.log.apply(console, ['[PWA설치]'].concat([].slice.call(arguments))); } catch (e) {}
  }

  function isStandalone() {
    return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
      || window.navigator.standalone === true;
  }

  // iOS 감지 (iPadOS 13+ Safari는 macOS user agent로 표시되므로 touch도 함께 체크)
  function isIOS() {
    var ua = navigator.userAgent || '';
    if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) return true;
    // iPadOS 13+: macOS Safari로 보이지만 터치 지원
    if (ua.indexOf('Mac') >= 0 && navigator.maxTouchPoints > 1) return true;
    return false;
  }

  // iOS Safari에서만 (Chrome/Firefox iOS는 PWA 설치 자체가 안 됨)
  function isIOSSafari() {
    if (!isIOS()) return false;
    var ua = navigator.userAgent || '';
    return /Safari/.test(ua) && !/CriOS|FxiOS|EdgiOS/.test(ua);
  }

  // 설치 완료 여부
  function isInstalled() {
    if (isStandalone()) return true;
    try { return localStorage.getItem(INSTALLED_KEY) === 'true'; } catch (e) { return false; }
  }
  function markInstalled() {
    try { localStorage.setItem(INSTALLED_KEY, 'true'); } catch (e) {}
  }

  // 최근 N시간 안에 닫았는지 — 시간 기반 쿨다운
  function isDismissedRecently() {
    try {
      var t = localStorage.getItem(DISMISS_AT_KEY);
      if (!t) return false;
      var elapsed = Date.now() - parseInt(t, 10);
      return elapsed < DISMISS_HOURS * 60 * 60 * 1000;
    } catch (e) { return false; }
  }
  function markDismissed() {
    try { localStorage.setItem(DISMISS_AT_KEY, String(Date.now())); } catch (e) {}
  }

  function showBanner(force) {
    if (!force) {
      if (isInstalled()) { log('이미 설치됨 → 배너 안 보임'); return; }
      if (isDismissedRecently()) { log('최근에 닫음(' + DISMISS_HOURS + '시간 쿨다운) → 배너 안 보임'); return; }
    }
    var banner = document.getElementById('pwa-install-banner');
    if (banner) { banner.classList.add('show'); log('배너 표시'); }
  }

  function hideBanner() {
    var banner = document.getElementById('pwa-install-banner');
    if (banner) banner.classList.remove('show');
  }

  // 디버깅/수동 트리거
  window.b2ShowInstall = function() {
    try { localStorage.removeItem(INSTALLED_KEY); } catch (e) {}
    try { localStorage.removeItem(DISMISS_AT_KEY); } catch (e) {}
    if (!deferredPrompt) {
      log('beforeinstallprompt 이벤트가 아직 발생하지 않음. 원인: 1) 이미 설치됨 2) iOS Safari(미지원) 3) HTTPS 아님 4) Chrome 엔게이지먼트 부족');
    }
    showBanner(true);
  };

  // 기본 설치 팝업 차단
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredPrompt = e;
    log('beforeinstallprompt 발생 → 기본 팝업 차단, 커스텀 배너 표시 시도');
    showBanner();
  });

  // 설치 완료 — 영구 플래그
  window.addEventListener('appinstalled', function() {
    log('앱 설치 완료 → 영구 숨김');
    markInstalled();
    hideBanner();
    deferredPrompt = null;
  });

  function showIOSGuide() {
    var guide = document.getElementById('pwa-ios-guide');
    if (guide) guide.classList.add('show');
  }
  function hideIOSGuide() {
    var guide = document.getElementById('pwa-ios-guide');
    if (guide) guide.classList.remove('show');
  }

  document.addEventListener('DOMContentLoaded', function() {
    if (isStandalone()) { log('현재 standalone(설치된 PWA) 모드'); }
    var installBtn = document.getElementById('pwa-install-btn');
    var laterBtn = document.getElementById('pwa-install-later');
    var closeBtn = document.getElementById('pwa-install-close');
    var iosConfirm = document.getElementById('pwa-ios-confirm');

    // iOS Safari: beforeinstallprompt가 발생 안 하므로 페이지 로드 시 직접 배너 표시
    if (isIOSSafari() && !isStandalone()) {
      log('iOS Safari 감지 → 수동 안내 배너 표시');
      // 다른 콘텐츠가 먼저 보이도록 약간 지연
      setTimeout(function(){ showBanner(); }, 1500);
    }

    if (installBtn) {
      installBtn.addEventListener('click', function() {
        // iOS는 자동 설치 불가 → 가이드 모달 표시
        if (isIOSSafari()) {
          log('iOS 설치 가이드 표시');
          showIOSGuide();
          return;
        }
        if (!deferredPrompt) {
          log('아직 설치 가능 상태가 아님. 잠시 후 다시 시도해주세요.');
          return;
        }
        var promptEvent = deferredPrompt;
        deferredPrompt = null;
        promptEvent.prompt();
        promptEvent.userChoice.then(function(choice) {
          if (choice && choice.outcome === 'accepted') {
            log('사용자 설치 수락');
          } else {
            log('사용자 설치 취소 → ' + DISMISS_HOURS + '시간 쿨다운');
            markDismissed();
          }
          hideBanner();
        }).catch(function(err) {
          log('userChoice 에러:', err);
          hideBanner();
        });
      });
    }

    // 닫기/나중에: 시간 기반 쿨다운 (PC/모바일 일관 동작)
    function dismiss() {
      markDismissed();
      hideBanner();
      log('사용자가 닫음 → ' + DISMISS_HOURS + '시간 동안 안 보임');
    }
    if (laterBtn) laterBtn.addEventListener('click', dismiss);
    if (closeBtn) closeBtn.addEventListener('click', dismiss);
    if (iosConfirm) iosConfirm.addEventListener('click', function(){
      // 가이드를 끝까지 봤으니 배너도 닫고 1시간 쿨다운
      hideIOSGuide();
      hideBanner();
      markDismissed();
      log('iOS 가이드 확인 → 배너 닫기 + ' + DISMISS_HOURS + '시간 쿨다운');
    });
    var iosGuide = document.getElementById('pwa-ios-guide');
    // backdrop 클릭은 단순히 모달만 닫음 (다시 보고 싶을 수 있으니 배너는 유지)
    if (iosGuide) iosGuide.addEventListener('click', function(e){ if (e.target === iosGuide) hideIOSGuide(); });
  });
})();
</script>

<!-- PWA Service Worker 등록 + 자동 업데이트 -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js')
      .then((reg) => {
        console.log('SW 등록 완료:', reg.scope);
        // 매 페이지 로드 시 SW 업데이트 체크 (PWA가 새 빌드를 빨리 받게 함)
        try { reg.update(); } catch (e) {}
        // 새 SW가 설치되면 즉시 활성화 + 페이지 한 번 새로고침
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              // 새 SW 설치 완료 → controllerchange 이벤트로 새로고침
              console.log('새 SW 설치됨, 페이지를 갱신합니다...');
            }
          });
        });
      })
      .catch((err) => console.warn('SW 등록 실패:', err));
    // 새 SW가 활성화(controllerchange)되면 페이지 1회 자동 새로고침으로 새 캐시 적용
    let refreshed = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshed) return;
      refreshed = true;
      window.location.reload();
    });
  });
}
</script>

<!-- 동영상 전체화면 진입 시 가로(landscape)로 자동 회전 (Android Chrome / 데스크톱) -->
<!-- iOS는 PWA에서 Screen Orientation API를 막아놨음 → 유튜브 자체 전체화면 버튼이 native로 처리 -->
<script>
(function() {
  function lockLandscape() {
    if (screen.orientation && typeof screen.orientation.lock === 'function') {
      screen.orientation.lock('landscape').catch(function() { /* 무시 */ });
    }
  }
  function unlockOrientation() {
    if (screen.orientation && typeof screen.orientation.unlock === 'function') {
      try { screen.orientation.unlock(); } catch (e) {}
    }
  }
  function onChange() {
    var fsEl = document.fullscreenElement || document.webkitFullscreenElement;
    if (fsEl) lockLandscape(); else unlockOrientation();
  }
  document.addEventListener('fullscreenchange', onChange);
  document.addEventListener('webkitfullscreenchange', onChange);
})();
</script>

// 마지막 hidden 시각으로부터 5분 초과되면 인증 정보 제거
const SESSION_GRACE_MS = 5 * 60 * 1000;
(function checkSessionExpiryOnLoad() {
  try {
    // 일회성 마이그레이션: sessionStorage에 남아있던 인증 정보 → localStorage
    ['b2_user', 'b2_is_admin', 'b2_admin_authed'].forEach(function(k){
      try {
        var v = sessionStorage.getItem(k);
        if (v && !localStorage.getItem(k)) localStorage.setItem(k, v);
        sessionStorage.removeItem(k);
      } catch (e) {}
    });
    var t = localStorage.getItem('b2_hidden_at');
    if (t && Date.now() - parseInt(t, 10) > SESSION_GRACE_MS) {
      localStorage.removeItem('b2_user');
      localStorage.removeItem('b2_is_admin');
      localStorage.removeItem('b2_admin_authed');
      // Supabase auth 토큰까지 제거 — 안 그러면 onAuthStateChange가 자동 SIGNED_IN
      var sbKeys = [];
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (k && k.indexOf('sb-') === 0) sbKeys.push(k);
      }
      sbKeys.forEach(function(k){ try { localStorage.removeItem(k); } catch (e) {} });
    }
    localStorage.removeItem('b2_hidden_at');
  } catch (e) {}
})();

// 화면 어디서든 사용하는 "맨 위로" 플로팅 버튼. 스크롤이 120px 이상 내려가면 등장.
function ScrollToTopFab(props) {
  const offset = props.offsetBottom || 24;
  const [show, setShow] = React.useState(false);
  React.useEffect(function() {
    function onScroll() {
      var y = window.pageYOffset || (document.documentElement && document.documentElement.scrollTop) || (document.body && document.body.scrollTop) || 0;
      setShow(y > 120);
    }
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return function(){ window.removeEventListener('scroll', onScroll); };
  }, []);
  function scrollUp(){
    try { window.scrollTo({ top:0, behavior:'smooth' }); } catch(e) { window.scrollTo(0,0); }
    try {
      if (document.documentElement) document.documentElement.scrollTop = 0;
      if (document.body) document.body.scrollTop = 0;
    } catch(e) {}
  }
  if (!show) return null;
  return React.createElement('button', {
    onClick: scrollUp,
    'aria-label': '맨 위로',
    style: {
      position:'fixed', right:'20px', bottom: offset + 'px',
      width:'46px', height:'46px', borderRadius:'50%',
      background:'rgba(26,26,26,0.92)', color:'#fff', border:'none',
      boxShadow:'0 4px 14px rgba(0,0,0,0.22)',
      cursor:'pointer', zIndex: 9999,
      display:'flex', alignItems:'center', justifyContent:'center'
    }
  }, React.createElement('svg', { width:'20', height:'20', viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth:'2.5', strokeLinecap:'round', strokeLinejoin:'round' },
      React.createElement('polyline', { points:'18 15 12 9 6 15' })
  ));
}

function App() {
const [page, setPage] = React.useState(() => {
  try { return sessionStorage.getItem('b2_page') || 'home'; } catch { return 'home'; }
});
// 초기 hydrate: localStorage에 있으면 즉시 표시 (로딩 플래시 방지),
// 직후 Supabase 세션과 동기화하여 실제 권한·정보로 갱신.
const [user, setUser] = React.useState(() => {
  try { const s = localStorage.getItem('b2_user'); return s ? JSON.parse(s) : null; } catch { return null; }
});

// Supabase 세션과 동기화 — Email/OAuth 모두 동일 단일 진입점
// 비밀번호 복구 흐름은 따로 처리 (URL의 ?reset=... 또는 hash에 type=recovery 검출 시 skip)
React.useEffect(() => {
  let cancelled = false;
  function isRecoveryContext() {
    try {
      var s = window.location.search || '';
      var h = window.location.hash || '';
      return s.indexOf('reset=') >= 0 || h.indexOf('type=recovery') >= 0;
    } catch { return false; }
  }
  async function syncSession(session, shouldNavigate) {
    if (cancelled) return;
    if (!session?.user?.id) {
      try {
        if (localStorage.getItem('b2_user')) {
          window.B2Utils.clearAuthStorage();
          setUser(null);
          setIsAdmin(false);
          setAdminAuthed(false);
        }
      } catch {}
      return;
    }
    // 비밀번호 복구 세션이면 user 상태 갱신·이동 모두 skip — ResetPasswordPage가 처리
    if (isRecoveryContext()) return;

    const sUser = session.user;
    const email = String(sUser.email || '').toLowerCase();
    const meta = sUser.user_metadata || {};
    const provider = (sUser.app_metadata && sUser.app_metadata.provider) || 'email';
    const oauthName = meta.full_name || meta.name || meta.given_name || '';

    try {
      // 1차: auth_user_id로 조회
      let row = null;
      try {
        const r1 = await window.supabase.from('students')
          .select('*').eq('auth_user_id', sUser.id).maybeSingle();
        row = r1?.data || null;
      } catch {}
      if (cancelled) return;

      // 2차: 미연결 상태면 SECURITY DEFINER RPC로 retroactive link (RLS 우회)
      //   → email 일치하는 students 행이 있으면 자동 link, 그 행 id 반환
      if (!row) {
        try {
          const linkRes = await window.supabase.rpc('link_my_auth_account');
          if (linkRes?.data) {
            const r2 = await window.supabase.from('students')
              .select('*').eq('id', linkRes.data).maybeSingle();
            if (cancelled) return;
            row = r2?.data || null;
          }
        } catch (e) { console.warn('link_my_auth_account RPC 실패:', e); }
      }

      // 3차: 매칭되는 students 행 없음 → signup 유도
      if (!row) {
        if (email) {
          setOauthPrefill({ email, name: oauthName });
          try { alert('학원에 등록되지 않은 계정입니다. 회원가입을 먼저 진행해 주세요.'); } catch {}
          setPage('signup');
          try { sessionStorage.setItem('b2_page', 'signup'); } catch {}
          try { window.history.pushState({ page: 'signup' }, '', ''); } catch {}
        }
        try { await window.supabase.auth.signOut(); } catch {}
        return;
      }

      // 상태 검사
      if (row.withdrawn_at || row.is_active === false) {
        try { alert('탈퇴 처리된 계정입니다.'); } catch {}
        try { await window.supabase.auth.signOut(); } catch {}
        return;
      }
      if (row.role === 'pending_teacher') {
        try { alert('관리자 승인 대기 중입니다.'); } catch {}
        try { await window.supabase.auth.signOut(); } catch {}
        return;
      }
      if (row.role === 'pending_student' || row.role === 'pending_parent') {
        try { alert('가입 처리 중입니다. 잠시 후 다시 시도해 주세요.'); } catch {}
        try { await window.supabase.auth.signOut(); } catch {}
        return;
      }

      // login_provider 갱신 (정보성)
      if (provider && row.login_provider !== provider) {
        try { await window.supabase.from('students').update({ login_provider: provider }).eq('id', row.id); } catch {}
      }

      const u = await window.B2Utils.buildUserFromStudentRow(row);
      if (cancelled) return;
      setUser(u);
      try { localStorage.setItem('b2_user', JSON.stringify(u)); } catch {}

      const role = String(u.role || '').toLowerCase();
      const isAdminRole = role === 'admin' || role === 'administrator' || role === '관리자';
      if (isAdminRole) {
        setIsAdmin(true); setAdminAuthed(true);
        try { localStorage.setItem('b2_is_admin','true'); localStorage.setItem('b2_admin_authed','true'); } catch {}
      }
      // 신규 sign-in 시에만 역할별 페이지로 자동 이동
      if (shouldNavigate) {
        let nextPage = null;
        if (isAdminRole) nextPage = 'admin';
        else if (role === 'teacher' || role === 'teachers' || role === '선생님' || role === '강사') nextPage = 'teacher';
        else if (role === 'student' || role === 'students' || role === '학생' || role === 'parent' || role === 'parents' || role === '학부모') nextPage = 'portal';
        // 이미 동일 페이지에 있으면 history push 생략 (뒤로가기 중복 방지)
        try {
          var curPage = sessionStorage.getItem('b2_page') || 'home';
          if (nextPage && curPage !== nextPage) {
            setPage(nextPage);
            sessionStorage.setItem('b2_page', nextPage);
            window.history.pushState({ page: nextPage }, '', '');
          }
        } catch {}
      }
    } catch (e) { console.error('syncSession 오류:', e); }
  }
  (async () => {
    try {
      const { data } = await window.supabase.auth.getSession();
      await syncSession(data?.session || null, false);
    } catch (e) { console.error('getSession 오류:', e); }
    // OAuth hash가 URL에 남아있으면 정리 (단, 복구 흐름이면 hash를 ResetPasswordPage가 쓰니 보존)
    try {
      if (!isRecoveryContext()
          && window.location.hash
          && window.location.hash.indexOf('access_token') >= 0) {
        window.history.replaceState({}, '', window.location.pathname + window.location.search);
      }
    } catch {}
  })();
  const subRes = window.supabase.auth.onAuthStateChange(function(event, session) {
    if (event === 'PASSWORD_RECOVERY') {
      // 복구 세션 — ResetPasswordPage가 처리. 추가 동기화 불필요.
      return;
    }
    if (event === 'SIGNED_IN') {
      syncSession(session, true);
    } else if (event === 'TOKEN_REFRESHED' || event === 'USER_UPDATED') {
      syncSession(session, false);
    } else if (event === 'SIGNED_OUT') {
      setUser(null); setIsAdmin(false); setAdminAuthed(false);
      try { window.B2Utils.clearAuthStorage(); } catch {}
    }
  });
  return () => { cancelled = true; try { subRes.data.subscription.unsubscribe(); } catch {} };
}, []);

const [loginInitialForgot, setLoginInitialForgot] = React.useState(false);

React.useEffect(() => { loadFromDB(); }, []);
// 학생이 강의실(portal)에 들어올 때마다 본인 수강 목록 갱신 (승인 즉시 반영)
React.useEffect(() => { if (page === 'portal' && user) { refreshUser(); } }, [page]);

// 브라우저 뒤로가기 지원 + 폰 뒤로가기 앱 내 처리
React.useEffect(() => {
function handlePopState(e) {
const p = e.state?.page || 'home';
// 홈이면 다시 history 스택 쌓아서 앱 밖으로 못 나가게
if (p === 'home') {
  window.history.pushState({ page: 'home' }, '', '');
}
setPage(p);
try { sessionStorage.setItem('b2_page', p); } catch {}
}
window.addEventListener('popstate', handlePopState);
// URL의 ?reset=<token> 감지 → 비밀번호 재설정 페이지
// URL의 ?page=privacy|terms 감지 → 정적 페이지 직접 진입 (외부 검수/링크 공유용)
let initialPage = (()=>{ try { return sessionStorage.getItem('b2_page')||'home'; } catch { return 'home'; } })();
try {
  const params = new URLSearchParams(window.location.search);
  const rt = params.get('reset');
  if (rt) {
    setResetToken(rt);
    initialPage = 'reset';
    const u = new URL(window.location.href);
    u.searchParams.delete('reset');
    window.history.replaceState({ page: 'reset' }, '', u.pathname + (u.search || '') + u.hash);
  } else {
    const pageParam = params.get('page');
    if (pageParam === 'privacy' || pageParam === 'terms') {
      initialPage = pageParam;
    }
  }
} catch {}
// 초기 스택: home을 두 번 쌓아서 첫 뒤로가기가 앱 내에서 처리되게
window.history.replaceState({ page: 'home' }, '', '');
window.history.pushState({ page: initialPage }, '', '');
setPage(initialPage);
return () => window.removeEventListener('popstate', handlePopState);
}, []);

function navigate(p) {
setPage(p);
try { sessionStorage.setItem('b2_page', p); } catch {}
window.history.pushState({ page: p }, '', '');
window.scrollTo({ top: 0, behavior: 'smooth' });
}
// 다른 컴포넌트에서 navigate를 호출할 수 있도록 노출
try { window.b2Navigate = navigate; } catch {}

// PWA 백그라운드 5분 그레이스 — hidden 시각 기록 + visible 시 초과면 로그아웃
React.useEffect(() => {
  function onVisibilityChange() {
    try {
      if (document.visibilityState === 'hidden') {
        localStorage.setItem('b2_hidden_at', String(Date.now()));
      } else if (document.visibilityState === 'visible') {
        const t = localStorage.getItem('b2_hidden_at');
        localStorage.removeItem('b2_hidden_at');
        if (t && Date.now() - parseInt(t, 10) > SESSION_GRACE_MS) {
          // 5분 초과 — 자동 로그아웃 + Supabase 토큰까지 제거 + 강제 reload
          // (signOut만으로는 비동기 + onAuthStateChange가 다시 SIGNED_IN을 트리거할 수 있어 reload로 깔끔히 끊는다)
          try { window.B2Utils.clearAuthStorage(); } catch (e) {}
          setUser(null);
          setIsAdmin(false);
          setAdminAuthed(false);
          try { window.supabase.auth.signOut(); } catch (e) {}
          try { window.location.reload(); } catch (e) {}
          return;
        }
      }
    } catch (e) {}
  }
  document.addEventListener('visibilitychange', onVisibilityChange);
  return () => document.removeEventListener('visibilitychange', onVisibilityChange);
}, []);

// Naver OAuth 콜백 — Supabase가 미지원이라 Edge Function으로 교환
// Google/Kakao는 위 syncSession이 onAuthStateChange로 자동 처리.
// Naver Edge Function이 Supabase 세션을 mint하지 못하므로, 임시로 비활성화 상태.
// (naver-oauth-exchange가 Supabase JWT를 발급하도록 Phase 6 이후 별도 작업 필요)
React.useEffect(() => {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');
  if (!code || !state || state.indexOf('naver_') !== 0) return;
  try { window.history.replaceState({}, '', '/'); } catch {}
  try { sessionStorage.removeItem('b2_naver_state'); } catch {}
  alert('네이버 로그인은 현재 점검 중입니다. 다른 로그인 방법을 이용해 주세요.');
}, []);

function getUserRole(u) {
return String(u?.role || u?.user_role || u?.type || u?.user_type || '').trim().toLowerCase();
}

function isTeacherUser(u) {
const role = getUserRole(u);
return role === 'teacher' || role === 'teachers' || role === '선생님' || role === '강사';
}

// 학원 내부인(학생·선생님·관리자) 판별. 이벤트 배너 같은 신규 고객 유치용 UI를 숨길 때 사용.
// 일반 회원(role 없음·parent 등)은 잠재 고객이므로 false 반환 → 노출 대상.
function isInsiderUser(u) {
if (!u) return false;
const role = getUserRole(u);
return (
  role === 'admin' || role === 'administrator' || role === '관리자' ||
  role === 'teacher' || role === 'teachers' || role === '선생님' || role === '강사' ||
  role === 'student' || role === 'students' || role === '학생'
);
}

function handleLogout() {
setUser(null);
setIsAdmin(false);
setAdminAuthed(false);
window.B2Utils.clearAuthStorage();
// 소셜 로그인 세션도 함께 종료 (Supabase Auth)
try { window.supabase.auth.signOut(); } catch {}
navigate('home');
}

function handleAdminClick() {
navigate('admin');
}

// 회원가입 페이지로 바로 이동
function handleSignup() {
setShowLogin(false);
navigate('signup');
}

// Supabase Auth 이전 후: admin 권한은 students.role='admin'에서 결정됨.
// effectiveUser는 단순히 user를 그대로 노출. (예전의 'admin' 가짜 객체 제거)
const effectiveUser = user;

return React.createElement('div', { style:{ minHeight:'100vh', display:'flex', flexDirection:'column' } },

// 로그인 모달 — admin/student/teacher/parent 모두 동일 흐름.
// 로그인 성공 후 user 상태 갱신·역할별 라우팅은 위쪽 syncSession이 단일 처리.
showLogin && React.createElement(LoginModal, {
key: loginInitialForgot ? 'login-forgot' : 'login-normal',
initialForgot: loginInitialForgot,
onClose: ()=>{ setShowLogin(false); setLoginInitialForgot(false); },
onSignup: handleSignup,
}),

// 상단 네비
React.createElement(MainNav, {
page,
setPage: navigate,
user: effectiveUser,
adminAuthed,
onLoginClick: ()=>setShowLogin(true),
onSignupClick: handleSignup,
onForgotClick: ()=>{ setLoginInitialForgot(true); setShowLogin(true); },
onAdminClick: handleAdminClick,
onLogout: handleLogout,
examDate: EXAM_DATE,
}),

// 메인 콘텐츠
adminAuthed && page !== 'admin' && React.createElement('button', {
  onClick:function(){ navigate('admin'); },
  style:{ position:'fixed', right:'22px', top:'104px', zIndex:9999, background:'#1A1A1A', color:'#fff', border:'none', borderRadius:'999px', padding:'9px 15px', fontSize:'13px', fontWeight:'800', boxShadow:'0 6px 18px rgba(0,0,0,0.18)', cursor:'pointer', fontFamily:'Manrope, sans-serif' }
}, '관리자 페이지'),

isTeacherUser(effectiveUser) && !adminAuthed && page !== 'teacher' && React.createElement('button', {
  onClick:function(){ navigate('teacher'); },
  style:{ position:'fixed', right:'22px', top:'104px', zIndex:9999, background:'#3A3A3A', color:'#fff', border:'none', borderRadius:'999px', padding:'9px 15px', fontSize:'13px', fontWeight:'800', boxShadow:'0 6px 18px rgba(0,0,0,0.18)', cursor:'pointer', fontFamily:'Manrope, sans-serif' }
}, '선생님 페이지'),

React.createElement('main', { style:{ flex:1 } },

page === 'home' && React.createElement(HomePage, {
banners: state.banners,
slides: state.slides,
categories: [
{ emoji:'', label:'수학', page:'service', highlight:false },
{ emoji:'', label:'영어', page:'service', highlight:false },
{ emoji:'', label:'국어', page:'service', highlight:false },
{ emoji:'', label:'과학', page:'service', highlight:false },
{ emoji:'', label:'내신 대비', page:'service', highlight:false },
{ emoji:'', label:'수능 특강', page:'service', highlight:true },
],
notices: state.notices,
announcements: state.announcements,
setPage: navigate,
isAdmin,
content: state.content,
onAdminAction: ()=>{},
user: effectiveUser,
onLoginClick: ()=>setShowLogin(true),
}),

page === 'service' && React.createElement(ServicePage, { setPage: navigate, courses: state.courses, user: effectiveUser, onLoginClick: ()=>setShowLogin(true), refresh: loadFromDB }),
page === 'contact' && React.createElement(ContactPage),
page === 'about' && React.createElement(AboutPage, { setPage: navigate }),
page === 'recruit' && React.createElement(RecruitPage, { setPage: navigate }),
page === 'privacy' && React.createElement(PrivacyPolicyPage),
page === 'terms' && React.createElement(TermsPage),
page === 'leveltest' && React.createElement(LevelTestPage, { user: effectiveUser, onLoginClick: ()=>setShowLogin(true), setPage: navigate }),

page === 'reset' && resetToken && React.createElement(ResetPasswordPage, { token: resetToken, onDone: ()=>{ setResetToken(null); navigate('home'); setShowLogin(true); } }),

page === 'signup' && React.createElement(SignupPage, {
prefill: oauthPrefill,
onBack: ()=>{ setOauthPrefill(null); navigate('home'); },
onComplete: ()=>{ setOauthPrefill(null); navigate('home'); },
}),

page === 'portal' && React.createElement(StudentPortal, {
user: effectiveUser,
isAdmin: adminAuthed || isTeacherUser(effectiveUser),
adminAuthed,
courses: state.courses,
onLoginClick: ()=>setShowLogin(true),
}),

page === 'teacher' && React.createElement(TeacherPortal, {
user: effectiveUser,
courses: state.courses,
isAdmin: adminAuthed,
adminAuthed,
onLogout: handleLogout,
}),

page === 'admin' && React.createElement(AdminPanel, {
state,
setState,
adminAuthed,
setAdminAuthed,
onLogout: handleLogout,
user,
onLoginClick: ()=>setShowLogin(true),
}),
),

/* 사이트 푸터 (관리자/선생님/응시 화면 제외) */
page !== 'admin' && page !== 'teacher' && React.createElement(SiteFooter, { setPage: navigate }),

/* 맨 위로 가기 floating 버튼 (모든 페이지) — 이벤트 버튼이 보이면 그 위에 비키도록 offset 조정 */
React.createElement(ScrollToTopFab, { offsetBottom: (eventButton.enabled && !eventClicked && !isInsiderUser(user) && page !== (eventButton.target_page || 'leveltest') && page !== 'admin' && page !== 'teacher') ? 84 : 24 }),

/* 이벤트 floating 버튼: 학원 내부인(학생·선생님·관리자)에게는 숨김, 비로그인·일반 회원(잠재 고객)에게만 노출.
   페이지별 제외(타겟 페이지 / 관리자 / 선생님 페이지)는 그대로. 한 번 누르면 영구 숨김. */
eventButton.enabled && !eventClicked && !isInsiderUser(user) && page !== (eventButton.target_page || 'leveltest') && page !== 'admin' && page !== 'teacher' && React.createElement('button', {
  onClick: function(){
    try { localStorage.setItem('b2_event_button_clicked', eventButtonKey); } catch (e) {}
    setEventClickedKey(eventButtonKey);
    navigate(eventButton.target_page || 'leveltest');
  },
  style:{
    position:'fixed', right:'20px', bottom:'24px',
    background:'linear-gradient(135deg, #E60012 0%, #B8000F 100%)',
    color:'#fff', border:'none', borderRadius:'999px',
    padding:'14px 22px', fontSize:'14px', fontWeight:'800',
    cursor:'pointer', fontFamily:'Manrope, sans-serif',
    boxShadow:'0 8px 22px rgba(0,0,0,0.18)',
    zIndex: 9000, letterSpacing:'-0.01em',
    display:'flex', alignItems:'center', gap:'8px'
  },
  onMouseEnter: function(e){ e.currentTarget.style.transform = 'translateY(-2px)'; },
  onMouseLeave: function(e){ e.currentTarget.style.transform = 'translateY(0)'; }
},
  eventButton.badge && React.createElement('span', { style:{ fontSize:'10px', fontWeight:'800', background:'#fff', color:'#E60012', borderRadius:'999px', padding:'2px 8px', letterSpacing:'0.04em' } }, eventButton.badge),
  eventButton.text || '무료 레벨테스트'
)
);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
